<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Phim Sắp Chiếu - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #E50914; --bg-dark: #0b0c10; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Montserrat', sans-serif; padding-top: 80px; }
        .navbar { background: rgba(11, 12, 16, 0.95) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .navbar-brand { font-weight: 800; color: var(--primary-color) !important; }
        .page-header { padding: 40px 0; border-bottom: 1px dashed #333; margin-bottom: 40px; }
        .title-glow { font-weight: 800; text-transform: uppercase; text-shadow: 0 0 15px var(--primary-color); }
        .upcoming-card { background: #161b22; border-radius: 15px; overflow: hidden; border: 1px solid #30363d; transition: 0.3s; height: 100%; }
        .upcoming-card:hover { transform: translateY(-10px); border-color: var(--primary-color); box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); }
        .poster-box { position: relative; height: 380px; overflow: hidden; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; }
        .coming-soon-badge { position: absolute; top: 15px; right: 15px; background: var(--primary-color); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.7rem; }
        .movie-name { font-size: 1.1rem; color: #fff; margin-bottom: 5px; }
        /* CSS cho nút đặt vé sớm */
        .btn-early { background: linear-gradient(45deg, #E50914, #800000); border: none; font-weight: 700; transition: 0.3s; }
        .btn-early:hover { box-shadow: 0 0 15px var(--primary-color); transform: scale(1.05); color: #fff; }
    </style>
</head>
<body>

<nav th:replace="~{home :: nav}"></nav>

<div class="container mb-5">
    <div class="page-header text-center">
        <h2 class="title-glow"><i class="fa-solid fa-hourglass-start me-3"></i>SIÊU PHẨM SẮP ĐỔ BỘ</h2>
        <p class="text-secondary mt-2">Đừng bỏ lỡ những khoảnh khắc bùng nổ sắp tới tại PELE Cinema</p>
    </div>

    <div class="row g-4">
        <div class="col-md-3">
            <div class="upcoming-card d-flex flex-column">
                <div class="poster-box">
                    <img src="/img/mavel.jpg" alt="Mavel Movie">
                    <div class="coming-soon-badge">SUẤT CHIẾU SỚM</div>
                </div>
                <div class="p-3 flex-grow-1">
                    <h6 class="fw-bold movie-name text-truncate">VŨ TRỤ MARVEL MỚI</h6>
                    <p class="small text-secondary mb-3">Mở bán vé sớm từ: <b class="text-white">12/03</b></p>
                    <a href="/booking/early/1" class="btn btn-early btn-sm w-100 rounded-pill py-2">
                        <i class="fa-solid fa-bolt me-1"></i> ĐẶT VÉ TRƯỚC
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="upcoming-card d-flex flex-column">
                <div class="poster-box">
                    <img src="/img/avarta.jpg" alt="Avatar">
                    <div class="coming-soon-badge">SẮP CHIẾU</div>
                </div>
                <div class="p-3 flex-grow-1">
                    <h6 class="fw-bold movie-name text-truncate">AVATAR 3</h6>
                    <p class="small text-secondary mb-3">Dự kiến khởi chiếu: <b class="text-white">15/03</b></p>
                    <a href="/booking/early/2" class="btn btn-secondary btn-sm w-100 rounded-pill py-2 disabled">
                        <i class="fa-solid fa-clock me-1"></i> CHỜ MỞ VÉ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
