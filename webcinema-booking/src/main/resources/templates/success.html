<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đặt vé thành công - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #E50914; --bg-dark: #0b0c10; }
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .success-card {
            background: #1f2833;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
            position: relative;
        }
        .check-icon {
            font-size: 60px;
            color: #28a745;
            margin-bottom: 15px;
            animation: bounceIn 1s;
        }

        /* Style cho tấm vé bên trong */
        .e-ticket {
            background: #fff;
            color: #333;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            position: relative;
        }
        .ticket-id {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #888;
            font-weight: 700;
        }
        .qr-code {
            width: 120px;
            height: 120px;
            margin: 10px auto;
        }
        .qr-code img { width: 100%; }

        .btn-home {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
            margin-top: 25px;
        }
        .btn-home:hover {
            background: #b80710;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
            color: white;
            transform: scale(1.05);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="success-card" th:if="${bookingId != null}">
    <div class="check-icon">
        <i class="fa-solid fa-circle-check"></i>
    </div>
    <h2 class="fw-bold text-warning mb-2">THANH TOÁN XONG!</h2>
    <p class="text-white-50 small">Cảm ơn cậu đã lựa chọn <strong>PELE Cinema</strong>.</p>

    <div class="e-ticket">
        <div class="ticket-id">MÃ VÉ: #<span th:text="${bookingId}">12345</span></div>
        <div class="qr-code">
            <img th:src="'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=PELE-TICKET-' + ${bookingId}" alt="QR Code">
        </div>
        <div class="fw-bold text-dark mt-2" style="font-size: 0.9rem;">PELE CINEMA E-TICKET</div>
        <p class="text-muted mb-0" style="font-size: 0.7rem;">Vui lòng đưa mã này cho nhân viên tại quầy.</p>
    </div>

    <a href="/" class="btn btn-home">
        <i class="fa-solid fa-house me-2"></i> Về trang chủ
    </a>
</div>

<div class="success-card" th:unless="${bookingId != null}">
    <i class="fa-solid fa-triangle-exclamation text-danger fs-1 mb-3"></i>
    <h3 class="fw-bold">LỖI TRUY CẬP</h3>
    <p class="text-white-50">Cậu chưa thực hiện đặt vé hoặc phiên làm việc đã hết hạn.</p>
    <a href="/" class="btn btn-outline-light rounded-pill px-4 mt-3 text-decoration-none">Quay lại</a>
</div>

</body>
</html>
