<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phân Xử Tranh Chấp - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary-red: #E50914; --bg-dark: #050505; --bg-card: #111; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Montserrat', sans-serif; padding-top: 20px; }

        /* Khung Tòa Án */
        .dispute-container { max-width: 900px; margin: 0 auto; background: var(--bg-card); border: 1px solid var(--primary-red); border-radius: 12px; box-shadow: 0 0 30px rgba(229, 9, 20, 0.2); overflow: hidden; }

        /* Header Tòa Án */
        .dispute-header { background: linear-gradient(90deg, #3a0000 0%, #800000 100%); padding: 20px; border-bottom: 2px solid var(--primary-red); display: flex; justify-content: space-between; align-items: center; }
        .dispute-title { font-family: 'Cinzel', serif; font-weight: 800; font-size: 1.5rem; margin: 0; text-shadow: 0 0 10px rgba(255,0,0,0.8); }

        /* Khu vực Chat */
        .chat-box { height: 450px; overflow-y: auto; padding: 20px; background: url('https://www.transparenttextures.com/patterns/dark-matter.png'); display: flex; flex-direction: column; gap: 15px; }

        /* Tin nhắn của khách / người bị kiện */
        .msg { max-width: 75%; padding: 12px 18px; border-radius: 15px; font-size: 0.95rem; position: relative; word-wrap: break-word; }
        .msg-user { align-self: flex-end; background: linear-gradient(135deg, #E50914, #900000); border-bottom-right-radius: 2px; box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3); }

        /* Tin nhắn của Admin (Boss) */
        .msg-admin { align-self: flex-start; background: rgba(255, 255, 255, 0.1); border: 1px solid #444; border-bottom-left-radius: 2px; }
        .msg-admin::before { content: "👑 PELE ADMIN"; display: block; font-size: 0.7rem; color: #ffc107; font-weight: bold; margin-bottom: 5px; }

        .msg-time { display: block; font-size: 0.7rem; color: #ccc; margin-top: 5px; text-align: right; }

        /* Ảnh bằng chứng */
        .evidence-img { max-width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid #fff; cursor: pointer; transition: 0.3s; }
        .evidence-img:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        /* Khu vực nhập liệu */
        .chat-input-area { padding: 15px; background: #0a0a0a; border-top: 1px solid #333; display: flex; gap: 10px; align-items: center; }
        .chat-input { flex: 1; background: transparent; border: 1px solid #444; color: #fff; border-radius: 25px; padding: 12px 20px; transition: 0.3s; }
        .chat-input:focus { outline: none; border-color: var(--primary-red); box-shadow: 0 0 10px rgba(229, 9, 20, 0.5); }

        /* Nút Upload và Gửi */
        .btn-upload { background: #333; color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .btn-upload:hover { background: #555; }
        .btn-send { background: var(--primary-red); color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .btn-send:hover { background: #b80710; box-shadow: 0 0 15px rgba(229, 9, 20, 0.8); }

        /* Ẩn input file mặc định */
        #fileEvidence { display: none; }
    </style>
</head>
<body>

<div class="container my-4">
    <a href="/ticket-market" class="text-secondary text-decoration-none mb-3 d-inline-block"><i class="fa-solid fa-arrow-left me-2"></i>Quay lại chợ vé</a>

    <div class="dispute-container">
        <div class="dispute-header">
            <div>
                <h3 class="dispute-title"><i class="fa-solid fa-gavel me-2"></i> PHÒNG XỬ LÝ TRANH CHẤP</h3>
                <span class="badge bg-warning text-dark mt-2" th:text="'Mã Vé: #' + (${bookingId != null ? bookingId : 'TICKET-000'})">Mã Vé: #TICKET-8923</span>
                <span class="badge bg-danger mt-2">Trạng thái: Đang xử lý</span>
            </div>
        </div>

        <div class="chat-box" id="chatBox">

            <th:block th:if="${messages == null or messages.isEmpty()}">
                <div class="msg msg-admin">
                    Xin chào, Admin PELE đã tiếp nhận phòng chat này. Vui lòng cung cấp hình ảnh bill chuyển khoản hoặc tin nhắn chứng minh có dấu hiệu lừa đảo.
                    <span class="msg-time">Hệ thống</span>
                </div>
            </th:block>

            <th:block th:each="msg : ${messages}">

                <div th:if="${msg.sender.role == 'ADMIN'}" class="msg msg-admin">
                    <span th:text="${msg.messageContent}">Nội dung Admin</span>

                    <img th:if="${msg.evidenceImageUrl != null and !msg.evidenceImageUrl.isEmpty()}"
                         th:src="${msg.evidenceImageUrl}" class="evidence-img" alt="Bằng chứng Admin">

                    <span class="msg-time" th:text="${#temporals.format(msg.sentAt, 'HH:mm dd/MM')}">10:00 AM</span>
                </div>

                <div th:if="${msg.sender.role == 'USER'}" class="msg msg-user">
                    <span th:text="${msg.messageContent}">Nội dung User</span>

                    <img th:if="${msg.evidenceImageUrl != null and !msg.evidenceImageUrl.isEmpty()}"
                         th:src="${msg.evidenceImageUrl}" class="evidence-img" alt="Bằng chứng Khách">

                    <span class="msg-time" th:text="${#temporals.format(msg.sentAt, 'HH:mm dd/MM')}">10:05 AM</span>
                </div>

            </th:block>

        </div>

        <form action="/api/dispute/send" method="POST" enctype="multipart/form-data" class="chat-input-area">

            <input type="hidden" name="bookingId" th:value="${bookingId}">

            <label for="fileEvidence" class="btn-upload" title="Đính kèm bằng chứng">
                <i class="fa-solid fa-paperclip"></i>
            </label>
            <input type="file" id="fileEvidence" name="imageFile" accept="image/png, image/jpeg, image/jpg">

            <input type="text" class="chat-input" name="message" placeholder="Nhập tin nhắn giải trình..." required autocomplete="off">

            <button type="submit" class="btn-send" title="Gửi tin nhắn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </div>
</div>

<script>
    // Tự động cuộn xuống tin nhắn mới nhất khi load trang
    const chatBox = document.getElementById("chatBox");
    chatBox.scrollTop = chatBox.scrollHeight;

    // Hiển thị tên file khi người dùng chọn ảnh
    document.getElementById("fileEvidence").addEventListener("change", function(e) {
        if(e.target.files.length > 0) {
            let fileName = e.target.files[0].name;
            alert("Bạn đã đính kèm ảnh bằng chứng: " + fileName);
        }
    });
</script>
</body>
</html>
