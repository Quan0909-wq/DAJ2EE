<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>PELE Admin - Phòng Phán Xét</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
        background-color: #0a0a0a;
        color: #ffffff;
        font-family: 'Montserrat', sans-serif;
        padding-top: 50px;
    }

    /* Tiêu đề quyền lực */
    .page-title {
        color: #E50914;
        font-weight: 800;
        text-transform: uppercase;
        text-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
        letter-spacing: 2px;
        margin-bottom: 40px;
    }

    /* Container chính */
    .justice-box {
        background-color: #141414;
        border: 1px solid #333;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        border-top: 5px solid #E50914;
    }

    /* Bảng kiểu Rạp Phim */
    .table {
        color: #ccc;
        border-color: #333;
        vertical-align: middle;
    }
    .table thead {
        background-color: #000;
        color: #ffc107; /* Màu vàng Gold cho sang */
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 1px;
    }
    .table tbody tr:hover {
        background-color: rgba(229, 9, 20, 0.05);
        color: #fff;
    }

    /* Trạng thái */
    .status-badge {
        background: linear-gradient(45deg, #E50914, #9b0000);
        color: white;
        padding: 6px 15px;
        border-radius: 30px;
        font-size: 0.75rem;
        font-weight: 700;
        box-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
        display: inline-block;
    }

    /* Nút bấm */
    .btn-resolve {
        background-color: #28a745;
        border: none;
        color: white;
        font-weight: 700;
        padding: 8px 20px;
        border-radius: 8px;
        transition: 0.3s;
    }
    .btn-resolve:hover {
        background-color: #218838;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
    }

    .btn-reject {
        background-color: transparent;
        border: 1px solid #666;
        color: #aaa;
        font-weight: 600;
        padding: 8px 20px;
        border-radius: 8px;
        transition: 0.3s;
    }
    .btn-reject:hover {
        border-color: #fff;
        color: #fff;
    }

    .btn-back {
        color: #ffc107;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
    }
    .btn-back:hover { color: #fff; }

    /* Empty state */
    .peace-msg {
        padding: 50px 0;
        color: #666;
        font-style: italic;
    }
    .peace-msg i { font-size: 3rem; margin-bottom: 20px; display: block; opacity: 0.3; }
  </style>
</head>
<body>

<div class="container mb-5">
  <div class="text-center">
    <h1 class="page-title"><i class="fa-solid fa-gavel"></i> PHÒNG PHÁN XÉT TRANH CHẤP</h1>
  </div>

  <div class="justice-box">
    <div th:if="${successMessage}" class="alert alert-success bg-success text-white border-0 text-center fw-bold mb-4">
      <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${successMessage}"></span>
    </div>

    <div class="table-responsive">
      <table class="table table-dark">
        <thead>
        <tr>
          <th class="ps-4">Thông tin phim</th>
          <th>Người Bán</th>
          <th>Người Mua</th>
          <th>Giá Pass</th>
          <th class="text-center">Trạng Thái</th>
          <th class="text-end pe-4">Phán Quyết</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="tp : ${disputedTickets}">
          <td class="ps-4">
            <div class="fw-bold text-white" th:text="${tp.booking.showtime.movie.title}"></div>
            <small class="text-muted" th:text="${tp.booking.seatNumbers}"></small>
          </td>
          <td th:text="${tp.seller.username}"></td>
          <td th:text="${tp.buyer.username}"></td>
          <td class="fw-bold text-warning" th:text="${#numbers.formatDecimal(tp.passPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
          <td class="text-center">
            <span class="status-badge"><i class="fa-solid fa-triangle-exclamation me-1"></i> TRANH CHẤP</span>
          </td>
          <td class="text-end pe-4">
            <div class="d-flex justify-content-end gap-2">
              <form th:action="@{/admin/ticket-disputes/resolve}" method="post">
                <input type="hidden" name="passId" th:value="${tp.id}">
                <button class="btn-resolve" onclick="return confirm('Cưỡng chế sang tên vé cho người mua?')">
                  <i class="fa-solid fa-check-double"></i> SANG TÊN
                </button>
              </form>
              <form th:action="@{/admin/ticket-disputes/reject}" method="post">
                <input type="hidden" name="passId" th:value="${tp.id}">
                <button class="btn-reject" onclick="return confirm('Hủy báo cáo lừa đảo, nhả vé lại chợ?')">
                  HỦY BỎ
                </button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <div th:if="${#lists.isEmpty(disputedTickets)}" class="text-center peace-msg">
      <i class="fa-solid fa-handshake"></i>
      <h4>Hiện tại thế giới đang hòa bình!</h4>
      <p>Không có vụ kiện cáo lừa đảo nào cần sếp ra tay.</p>
    </div>

    <div class="mt-4 border-top border-secondary pt-4 d-flex justify-content-between align-items-center">
      <a th:href="@{/admin}" class="btn-back">
        <i class="fa-solid fa-arrow-left"></i> Quay lại Admin Panel
      </a>
      <small class="text-muted">PELE Security System &copy; 2026</small>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
