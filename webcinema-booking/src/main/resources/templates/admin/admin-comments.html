<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản Lý Bình Luận - Admin PELE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #E50914; --dark: #0b0c10; }
        body { background: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; padding-top: 30px; }
        .card { background: #121212; border: 1px solid #333; border-radius: 15px; }
        .table { color: #ccc; }
        .table thead th { border-bottom: 2px solid var(--primary); color: #fff; }
        .btn-delete { color: #ff4d4d; border: 1px solid #ff4d4d; }
        .btn-delete:hover { background: #ff4d4d; color: #fff; }
    </style>
</head>
<body>
<div class="container mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <h2 class="fw-bold text-uppercase"><i class="fa-solid fa-comments text-danger me-2"></i>Kiểm Duyệt Bình Luận</h2>
        <a href="/admin" class="btn btn-outline-secondary rounded-pill">Quay lại Dashboard</a>
    </div>

    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>Người dùng</th>
                    <th>Phim</th>
                    <th>Nội dung</th>
                    <th>Sao</th>
                    <th>Ngày đăng</th>
                    <th class="text-end">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${comments}">
                    <td class="fw-bold text-warning" th:text="${c.user.fullName}">Khách</td>
                    <td th:text="${c.movie.title}">Tên phim</td>
                    <td th:text="${c.content}" style="max-width: 300px;" class="text-truncate">Nội dung...</td>
                    <td class="text-info" th:text="${c.rating} + ' ⭐'">5 ⭐</td>
                    <td th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy')}">Date</td>
                    <td class="text-end">
                        <a th:href="@{/admin/comments/delete/{id}(id=${c.id})}"
                           class="btn btn-sm btn-delete"
                           onclick="return confirm('Sếp có chắc muốn xóa bình luận này không?')">
                            <i class="fa-solid fa-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(comments)}">
                    <td colspan="6" class="text-center py-5 text-secondary">Chưa có bình luận nào để kiểm duyệt.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
