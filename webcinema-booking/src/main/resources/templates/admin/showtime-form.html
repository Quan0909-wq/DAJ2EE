<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Tạo Lịch Chiếu - PELE Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #f4f6f9; }
    .sidebar { height: 100vh; background: #1f2833; color: white; position: fixed; width: 250px; left: 0; top: 0; padding-top: 20px;}
    .sidebar-brand { font-weight: 800; font-size: 1.5rem; text-align: center; color: #E50914; margin-bottom: 30px;}
    .sidebar-brand span { color: #fff; }
    .nav-link { color: #c5c6c7; padding: 15px 25px; font-weight: 600; transition: 0.3s; }
    .nav-link:hover, .nav-link.active { background: #E50914; color: white; }
    .nav-link i { width: 25px; }
    .main-content { margin-left: 250px; padding: 20px 40px; }
    .form-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); max-width: 800px; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">PELE <span>ADMIN</span></div>
  <ul class="nav flex-column">
    <li class="nav-item">
      <a class="nav-link" href="/admin"><i class="fa-solid fa-gauge"></i> Tổng Quan</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="/admin/movies"><i class="fa-solid fa-film"></i> Quản Lý Phim</a>
    </li>
    <li class="nav-item">
      <a class="nav-link active" href="/admin/showtimes"><i class="fa-solid fa-calendar-days"></i> Lịch Chiếu</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="/admin/bookings"><i class="fa-solid fa-file-invoice-dollar"></i> Hoá Đơn Đặt Vé</a>
    </li>
    <li class="nav-item mt-5">
      <a class="nav-link text-warning" href="/"><i class="fa-solid fa-house"></i> Về Trang Khách</a>
    </li>
  </ul>
</div>

<div class="main-content">
  <h4 class="fw-bold mb-4">Lên Lịch Chiếu Mới</h4>

  <div class="form-card">
    <form action="/admin/showtimes/save" method="POST" th:object="${showtime}">

      <div class="mb-4">
        <label class="form-label fw-bold">Chọn Phim</label>
        <select class="form-select border-2 border-danger" th:field="*{movie}" required>
          <option value="">-- Click để chọn phim --</option>
          <option th:each="m : ${movies}" th:value="${m.id}" th:text="${m.title}"></option>
        </select>
      </div>

      <div class="mb-4">
        <label class="form-label fw-bold">Chọn Phòng Chiếu</label>
        <select class="form-select border-2 border-danger" th:field="*{room}" required>
          <option value="">-- Click để chọn phòng --</option>
          <option th:each="r : ${rooms}" th:value="${r.id}" th:text="${r.name}"></option>
        </select>
      </div>

      <div class="row mb-4">
        <div class="col-md-6">
          <label class="form-label fw-bold">Ngày Giờ Bắt Đầu</label>
          <input type="datetime-local" class="form-control" th:field="*{startTime}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Giá Vé (VNĐ)</label>
          <input type="number" class="form-control" th:field="*{price}" placeholder="VD: 120000" required>
        </div>
      </div>

      <div class="mt-5">
        <button type="submit" class="btn btn-danger fw-bold px-5 py-2">Tạo Suất Chiếu</button>
        <a href="/admin/showtimes" class="btn btn-light px-4 ms-2 border">Hủy Bỏ</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
