<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản Lý Khuyến Mãi - Admin PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #E50914; --bg-dark: #0b0c10; --bg-card: #121212; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Montserrat', sans-serif; padding-top: 30px; }

        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .card { background-color: var(--bg-card); border: 1px solid #1f2833; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }

        /* Chỉnh màu cho bảng (Table) */
        .table { color: #ccc; vertical-align: middle; }
        .table thead th { border-bottom: 2px solid var(--primary-color); color: #fff; background-color: rgba(229, 9, 20, 0.1); }
        .table tbody td { border-bottom: 1px solid #333; background-color: transparent; }
        .table-hover tbody tr:hover { background-color: rgba(255,255,255,0.05); color: #fff; }

        .promo-code { font-family: monospace; font-size: 1.1rem; color: #ffc107; background: rgba(255,193,7,0.1); padding: 5px 10px; border-radius: 5px; border: 1px dashed #ffc107; }

        /* Nút Tạo mới */
        .btn-add { background: linear-gradient(45deg, #E50914, #800000); border: none; font-weight: bold; color: white; transition: 0.3s; }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4); color: white; }

        /* Chỉnh màu Modal (Bảng thông báo nổi) */
        .modal-content { background-color: var(--bg-card); border: 1px solid #333; }
        .modal-header { border-bottom: 1px solid #333; }
        .modal-footer { border-top: 1px solid #333; }
        .form-control { background-color: #1a1a1a; border: 1px solid #333; color: white; }
        .form-control:focus { background-color: #222; border-color: var(--primary-color); color: white; box-shadow: none; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="admin-header">
        <div>
            <h2 class="fw-bold text-uppercase m-0"><i class="fa-solid fa-tags text-danger me-2"></i>Quản Lý Mã Giảm Giá</h2>
            <p class="text-secondary small mt-1 m-0">Chào mừng Sếp Quan trở lại hệ thống!</p>
        </div>
        <div>
            <a href="/" class="btn btn-outline-secondary me-2"><i class="fa-solid fa-house me-1"></i> Trang chủ rạp</a>
            <button class="btn btn-add px-4 py-2 rounded-pill" data-bs-toggle="modal" data-bs-target="#addPromoModal">
                <i class="fa-solid fa-plus me-1"></i> TẠO MÃ MỚI
            </button>
        </div>
    </div>

    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-hover mt-3">
                <thead>
                <tr>
                    <th>#ID</th>
                    <th>MÃ CODE</th>
                    <th>GIẢM GIÁ (VNĐ)</th>
                    <th>HẠN SỬ DỤNG</th>
                    <th>TRẠNG THÁI</th>
                    <th class="text-end">HÀNH ĐỘNG</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${promotions == null or #lists.isEmpty(promotions)}">
                    <td colspan="6" class="text-center text-secondary py-5">
                        <i class="fa-solid fa-box-open fa-3x mb-3 text-muted"></i><br>
                        Chưa có mã giảm giá nào. Sếp hãy bấm nút "Tạo Mã Mới" để bắt đầu nhé!
                    </td>
                </tr>

                <tr th:each="promo, stat : ${promotions}">
                    <td th:text="${stat.count}">1</td>
                    <td><span class="promo-code" th:text="${promo.code}">CODE</span></td>
                    <td class="text-danger fw-bold" th:text="'-' + ${#numbers.formatDecimal(promo.discountAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">-0 đ</td>
                    <td th:text="${promo.expiryDate}">dd/MM/yyyy</td>
                    <td><span class="badge bg-success">Đang hoạt động</span></td>
                    <td class="text-end">

                        <button class="btn btn-sm btn-outline-info me-1"
                                th:onclick="openEditModal([[${promo.code}]], [[${promo.discountAmount}]], [[${promo.expiryDate}]])">
                            <i class="fa-solid fa-pen"></i>
                        </button>

                        <a th:href="@{/admin/promotions/delete/{code}(code=${promo.code})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Sếp có chắc chắn muốn cho mã này bay màu không?');">
                            <i class="fa-solid fa-trash"></i>
                        </a>

                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="addPromoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold text-danger"><i class="fa-solid fa-ticket me-2"></i>Tạo Mã Khuyến Mãi Mới</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form action="/admin/promotions/add" method="POST">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">MÃ CODE (Viết hoa, không dấu)</label>
                        <input type="text" class="form-control" name="code" placeholder="VD: BOSSQUANVIP" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">SỐ TIỀN GIẢM (VNĐ)</label>
                        <input type="number" class="form-control" name="discountAmount" placeholder="VD: 50000" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">NGÀY HẾT HẠN</label>
                        <input type="date" class="form-control" name="expiryDate" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Hủy bỏ</button>
                    <button type="submit" class="btn btn-add rounded-pill px-4">LƯU MÃ GIẢM GIÁ</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="editPromoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold text-info"><i class="fa-solid fa-pen-to-square me-2"></i>Sửa Mã Khuyến Mãi</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form action="/admin/promotions/edit" method="POST">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">MÃ CODE</label>
                        <input type="text" class="form-control text-warning fw-bold bg-dark" id="editCode" name="code" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">SỐ TIỀN GIẢM MỚI (VNĐ)</label>
                        <input type="number" class="form-control" id="editDiscount" name="discountAmount" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">NGÀY HẾT HẠN MỚI</label>
                        <input type="date" class="form-control" id="editExpiry" name="expiryDate" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Hủy bỏ</button>
                    <button type="submit" class="btn btn-info rounded-pill px-4 text-white fw-bold">CẬP NHẬT MÃ</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function openEditModal(code, discount, expiry) {
        // Lấy dữ liệu từ dòng sếp bấm đổ vào ô tương ứng
        document.getElementById('editCode').value = code;
        document.getElementById('editDiscount').value = discount;
        document.getElementById('editExpiry').value = expiry;

        // Gọi bảng Modal Sửa lên màn hình
        var editModal = new bootstrap.Modal(document.getElementById('editPromoModal'));
        editModal.show();
    }
</script>
</body>
</html>
