<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm/Sửa Phim - PELE Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f6f9; }
        .sidebar { height: 100vh; background: #1f2833; color: white; position: fixed; width: 250px; left: 0; top: 0; padding-top: 20px; z-index: 100;}
        .sidebar-brand { font-weight: 800; font-size: 1.5rem; text-align: center; color: #E50914; margin-bottom: 30px; letter-spacing: 2px;}
        .sidebar-brand span { color: #fff; }
        .nav-link { color: #c5c6c7; padding: 15px 25px; font-weight: 600; transition: 0.3s;}
        .nav-link:hover, .nav-link.active { background: #E50914; color: white; }
        .nav-link i { width: 25px; }
        .main-content { margin-left: 250px; padding: 20px 40px; }
        .form-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">PELE <span>ADMIN</span></div>
    <ul class="nav flex-column">
        <li class="nav-item">
            <a class="nav-link" href="/admin"><i class="fa-solid fa-gauge"></i> Tổng Quan</a>
        </li>
        <li class="nav-item">
            <a class="nav-link active" href="/admin/movies"><i class="fa-solid fa-film"></i> Quản Lý Phim</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/admin/showtimes"><i class="fa-solid fa-calendar-days"></i> Lịch Chiếu</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/admin/bookings"><i class="fa-solid fa-file-invoice-dollar"></i> Hoá Đơn Đặt Vé</a>
        </li>
        <li class="nav-item mt-5">
            <a class="nav-link text-warning" href="/"><i class="fa-solid fa-house"></i> Về Trang Khách</a>
        </li>
    </ul>
</div>

<div class="main-content">
    <h4 class="fw-bold mb-4" th:text="${movie.id != null ? 'Cập Nhật Thông Tin Phim' : 'Thêm Phim Mới'}"></h4>

    <div class="form-card">
        <form action="/admin/movies/save" method="POST" th:object="${movie}">
            <input type="hidden" th:field="*{id}">

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Tên Phim</label>
                    <input type="text" class="form-control" th:field="*{title}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Thời Lượng (Phút)</label>
                    <input type="number" class="form-control" th:field="*{duration}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Ngày Khởi Chiếu</label>
                    <input type="date" class="form-control" th:field="*{releaseDate}">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Đạo Diễn</label>
                    <input type="text" class="form-control" th:field="*{director}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Diễn Viên</label>
                    <input type="text" class="form-control" th:field="*{cast}">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Link Ảnh Poster (URL)</label>
                    <input type="text" class="form-control" th:field="*{posterUrl}" placeholder="VD: https://link-anh.com/anh.jpg">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Link Trailer (YouTube Embed)</label>
                    <input type="text" class="form-control" th:field="*{trailerUrl}" placeholder="VD: https://www.youtube.com/embed/...">
                </div>

                <div class="col-12">
                    <label class="form-label fw-bold">Nội Dung Phim</label>
                    <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
                </div>

                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-danger fw-bold px-4">Lưu Dữ Liệu</button>
                    <a href="/admin/movies" class="btn btn-secondary px-4 ms-2">Hủy Bỏ</a>
                </div>
            </div>
        </form>
    </div>
</div>

</body>
</html>
