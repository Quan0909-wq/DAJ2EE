<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Săn Vé Sớm - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0c10; color: #fff; font-family: 'Montserrat', sans-serif; padding-top: 100px; }
        .navbar { background: rgba(11, 12, 16, 0.95) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .navbar-brand { font-weight: 800; color: #E50914 !important; }

        .booking-box {
            background: #121212;
            border: 1px solid #1f2833;
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            box-shadow: 0 10px 40px rgba(229, 9, 20, 0.2);
            border-top: 5px solid #E50914;
        }

        /* Đồng hồ đếm ngược */
        .countdown { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .time-box { background: #1f2833; padding: 15px; border-radius: 10px; min-width: 80px; }
        .time-box h2 { color: #E50914; font-weight: 800; margin: 0; }
        .time-box span { font-size: 0.8rem; color: #888; text-transform: uppercase; }

        .form-control { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; }
        .form-control:focus { background: #222; color: white; border-color: #E50914; box-shadow: 0 0 10px rgba(229, 9, 20, 0.5); }

        .btn-glow { background: linear-gradient(45deg, #E50914, #800000); border: none; font-weight: 800; padding: 12px; transition: 0.3s; }
        .btn-glow:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(229, 9, 20, 0.5); color: white; }
    </style>
</head>
<body>

<nav th:replace="~{home :: nav}"></nav>

<div class="container mb-5">
    <div class="booking-box">
        <i class="fa-solid fa-ticket fa-3x text-danger mb-3"></i>
        <h2 class="fw-bold text-uppercase">Săn Vé Chiếu Sớm</h2>
        <p class="text-secondary small">Siêu phẩm sẽ chính thức mở bán vé sau:</p>

        <div class="countdown">
            <div class="time-box"><h2>03</h2><span>Ngày</span></div>
            <div class="time-box"><h2>14</h2><span>Giờ</span></div>
            <div class="time-box"><h2>45</h2><span>Phút</span></div>
        </div>

        <hr class="border-secondary my-4">

        <h6 class="text-warning mb-3"><i class="fa-solid fa-bell me-2"></i>ĐĂNG KÝ NHẬN THÔNG BÁO</h6>
        <p class="small text-muted mb-4">Để lại email, hệ thống PELE sẽ tự động gửi link đặt vé VIP kèm mã giảm giá 50% Combo Bắp Nước ngay khi mở bán!</p>

        <form action="/" method="GET">
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Nhập email của bạn (Ví dụ: quan@gmail.com)" required>
            </div>
            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Số điện thoại" required>
            </div>
            <button type="submit" class="btn btn-glow w-100 rounded-pill text-white mt-2">
                NHẬN THÔNG BÁO NGAY
            </button>
        </form>

        <a href="/upcoming" class="btn btn-link text-secondary text-decoration-none mt-4 small"><i class="fa-solid fa-arrow-left me-1"></i> Trở lại phim sắp chiếu</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
