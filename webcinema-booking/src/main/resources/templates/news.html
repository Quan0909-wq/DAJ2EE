<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Góc Điện Ảnh - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #E50914; --bg-dark: #0b0c10; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Montserrat', sans-serif; padding-top: 80px; }
        .navbar { background: rgba(11, 12, 16, 0.95) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .navbar-brand { font-weight: 800; color: var(--primary-color) !important; }
        .news-card { background: #121212; border: 1px solid #1f2833; margin-bottom: 25px; border-radius: 12px; overflow: hidden; display: flex; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .news-card:hover { background: #1a1a1a; transform: scale(1.01); border-color: var(--primary-color); box-shadow: 0 0 20px rgba(229, 9, 20, 0.2); }
        .news-img { width: 300px; height: 180px; object-fit: cover; }
        .news-body { padding: 25px; flex: 1; }
        .category-tag { color: var(--primary-color); font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .news-title { font-weight: 700; margin-top: 5px; color: #fff; transition: 0.3s; text-decoration: none; display: block; }
        .news-title:hover { color: var(--primary-color); }
        @media (max-width: 768px) { .news-card { flex-direction: column; } .news-img { width: 100%; height: 200px; } }

        .btn-more { transition: 0.3s; }
        .btn-more:hover { letter-spacing: 1px; }
    </style>
</head>
<body>

<nav th:replace="~{home :: nav}"></nav>

<div class="container mt-4">
    <h3 class="fw-bold border-start border-4 border-danger ps-3 mb-5 text-uppercase">Góc Điện Ảnh</h3>

    <div class="row">
        <div class="col-12">
            <div class="news-card">
                <img src="/img/mavel.jpg" class="news-img" alt="Review">
                <div class="news-body">
                    <span class="category-tag">Review Phim</span>
                    <a href="/news/detail/1" class="news-title"><h4>Marvel 2026: Đỉnh cao kỹ xảo điện ảnh</h4></a>
                    <p class="text-secondary small mt-2">Trải nghiệm thị giác bùng nổ chỉ có tại PELE Cinema.</p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="small text-muted"><i class="fa-regular fa-calendar me-1"></i> 11/03/2026</span>
                        <a href="/news/detail/1" class="text-danger text-decoration-none small fw-bold btn-more">
                            Xem thêm <i class="fa-solid fa-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="news-card">
                <img src="/img/bap.jpg" class="news-img" alt="Khuyến Mãi">
                <div class="news-body">
                    <span class="category-tag">Khuyến Mãi</span>
                    <a href="/news/detail/2" class="news-title"><h4>Giảm giá 50% Combo Bắp Nước</h4></a>
                    <p class="text-secondary small mt-2">Chương trình tri ân khách hàng thân thiết. Đặt vé ngay hôm nay!</p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="small text-muted"><i class="fa-regular fa-calendar me-1"></i> 10/03/2026</span>
                        <a href="/news/detail/2" class="text-danger text-decoration-none small fw-bold btn-more">
                            Xem thêm <i class="fa-solid fa-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
