<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phim Sắp Chiếu - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <th:block th:replace="~{fragments/navbar :: navbarStyles}"></th:block>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; padding-top: 110px; }
        .hero-banner {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 60px 0;
            border-bottom: 3px solid #E50914;
            text-align: center;
        }
        .hero-title { font-size: 2.5rem; font-weight: 800; color: #E50914; }
        .movie-card {
            background: #121212;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .movie-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(229,9,20,0.3); }
        .movie-poster { width: 100%; height: 350px; object-fit: cover; }
        .badge-soon {
            position: absolute; top: 10px; right: 10px;
            background: #E50914; color: white; padding: 5px 12px;
            border-radius: 20px; font-size: 0.7rem; font-weight: 700;
        }
        .movie-title { font-weight: 800; font-size: 1rem; color: #fff; }
        .movie-genre { color: #888; font-size: 0.8rem; }
        .release-date { color: #E50914; font-size: 0.85rem; font-weight: 600; }
        .coming-soon-tag {
            background: rgba(229,9,20,0.15);
            color: #E50914;
            border: 1px solid #E50914;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div th:replace="~{fragments/navbar :: topbar}"></div>
<!-- Main navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- Sidebar -->
<div th:replace="~{fragments/navbar :: sidebar}"></div>
<!-- Dating notification panel -->
<div th:replace="~{fragments/navbar :: notifPanel}"></div>
<!-- Scripts -->
<div th:replace="~{fragments/navbar :: scripts}"></div>

<div class="hero-banner">
    <div class="container">
        <h1 class="hero-title"><i class="fas fa-film me-3"></i>PHIM SẮP CHIẾU</h1>
        <p class="text-secondary mt-2">Những bộ phim đáng mong chờ sắp ra mắt tại PELE Cinema</p>
    </div>
</div>

<div class="container py-5">
    <div class="row g-4">
        <div class="col-md-3" th:each="movie : ${movies}">
            <div class="movie-card">
                <div class="position-relative">
                    <img th:src="${movie.posterUrl}" class="movie-poster" alt="Poster"
                         referrerpolicy="no-referrer" loading="lazy"
                         onerror="this.onerror=null; this.src='https://image.tmdb.org/t/p/w500/7I6VUdPj6tQECNHdviJkUHD2u89.jpg';">
                    <div class="badge-soon">SẮP CHIẾU</div>
                </div>
                <div class="p-3">
                    <div class="movie-title mb-1" th:text="${movie.title}">Tên phim</div>
                    <div class="movie-genre mb-2" th:text="${movie.genre}">Thể loại</div>
                    <div class="release-date">
                        <i class="fas fa-calendar-alt me-1"></i>
                        <span th:text="${movie.releaseDate != null} ? ${#temporals.format(movie.releaseDate, 'dd/MM/yyyy')} : 'Sắp công bố'">Ngày chiếu</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 text-center text-secondary py-5" th:if="${#lists.isEmpty(movies)}">
            <i class="fas fa-film fa-4x mb-3" style="color: #333;"></i>
            <h4>Chưa có phim sắp chiếu</h4>
            <p> Quay lại trang chủ để xem phim đang chiếu</p>
            <a href="/" class="btn btn-danger mt-3"><i class="fas fa-home me-2"></i>Trang chủ</a>
        </div>
    </div>
</div>

</body>
</html>
