<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vé đang bán - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #E50914;
            --bg-body: #050505;
            --bg-card: #121212;
            --accent-purple: #667eea;
            --accent-green: #28a745;
            --accent-gold: #ffc107;
        }
        body {
            background-color: var(--bg-body);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
        }

        .page-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px 0;
            text-align: center;
            border-bottom: 3px solid var(--accent-purple);
        }

        .pass-list-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .pass-list-card:hover {
            border-color: rgba(102,126,234,0.3);
            transform: translateX(5px);
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge-selling { background: rgba(40,167,69,0.2); color: #28a745; }
        .badge-sold { background: rgba(220,53,69,0.2); color: #ff6b6b; }
        .badge-cancelled { background: rgba(255,255,255,0.1); color: #888; }

        .btn-outline-gradient {
            background: transparent;
            border: 1px solid rgba(102,126,234,0.4);
            color: #667eea;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-outline-gradient:hover {
            background: rgba(102,126,234,0.15);
            color: #667eea;
        }
        .btn-cancel {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.3);
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-cancel:hover {
            background: rgba(220,53,69,0.25);
            color: #fff;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="page-header">
    <div class="container">
        <a href="/" class="text-secondary text-decoration-none small">
            <i class="fas fa-arrow-left me-1"></i> Quay lại
        </a>
        <h2 class="fw-bold mt-2" style="color: var(--accent-purple);">
            <i class="fas fa-tags me-2"></i>VÉ CỦA TÔI ĐANG BÁN
        </h2>
        <p class="text-secondary m-0">Quản lý các vé bạn đang rao bán trên chợ vé</p>
    </div>
</div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <a href="/ticket-market" class="btn btn-outline-gradient">
                    <i class="fas fa-search me-2"></i>Xem chợ vé
                </a>
                <a href="/ticket/post" class="btn" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 8px 20px; border-radius: 8px; font-weight: 600;">
                    <i class="fas fa-plus me-2"></i>Đăng thêm vé
                </a>
            </div>

            <div th:if="${#lists.isEmpty(passes)}" class="text-center py-5">
                <i class="fas fa-tags fa-4x text-secondary mb-4"></i>
                <h4 class="text-secondary fw-bold">Bạn chưa đăng vé nào để bán</h4>
                <p class="text-muted mb-4">Đăng vé không sử dụng để nhận lại tiền!</p>
                <a href="/ticket/post" class="btn btn-danger px-4">
                    <i class="fas fa-plus me-2"></i>Đăng vé ngay
                </a>
            </div>

            <div th:each="pass : ${passes}" class="pass-list-card">
                <div class="row align-items-center g-3">
                    <div class="col-md-2">
                        <img th:src="${pass.booking.showtime.movie.posterUrl}"
                             style="width: 80px; height: 110px; object-fit: cover; border-radius: 8px;">
                    </div>
                    <div class="col-md-6">
                        <div class="fw-bold mb-1" th:text="${pass.booking.showtime.movie.title}">Tên phim</div>
                        <div class="small text-secondary mb-1">
                            <i class="fas fa-calendar-day me-1"></i>
                            <span th:text="${#temporals.format(pass.booking.showtime.startTime, 'dd/MM/yyyy HH:mm')}">25/03/2026 19:00</span>
                            | <span th:text="${pass.booking.showtime.room.name}">Phòng 1</span>
                        </div>
                        <div>
                            <span style="background: rgba(255,193,7,0.2); padding: 2px 10px; border-radius: 10px; color: #ffc107; font-size: 0.8rem; font-weight: 700;">
                                <i class="fas fa-chair me-1"></i><span th:text="${pass.booking.seatNumbers}">A1</span>
                            </span>
                        </div>
                    </div>
                    <div class="col-md-2 text-center">
                        <div class="fw-bold fs-5" style="color: var(--primary-red);"
                             th:text="${#numbers.formatDecimal(pass.passPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">80,000đ</div>
                        <div th:if="${pass.status == 'AVAILABLE'}" class="status-badge badge-selling">
                            <i class="fas fa-circle me-1" style="font-size: 0.5rem;"></i>Đang bán
                        </div>
                        <div th:if="${pass.status == 'SOLD'}" class="status-badge badge-sold">
                            <i class="fas fa-check me-1"></i>Đã bán
                        </div>
                        <div th:if="${pass.status == 'CANCELLED'}" class="status-badge badge-cancelled">
                            Đã hủy
                        </div>
                    </div>
                    <div class="col-md-2 text-end">
                        <a th:href="@{'/ticket/' + ${pass.id}}" class="btn btn-outline-gradient mb-2 w-100">
                            <i class="fas fa-eye me-1"></i>Chi tiết
                        </a>
                        <form th:if="${pass.status == 'AVAILABLE'}"
                              th:action="@{'/ticket/' + ${pass.id} + '/cancel'}" method="POST"
                              onsubmit="return confirm('Hủy đăng vé này?')">
                            <button type="submit" class="btn-cancel w-100">
                                <i class="fas fa-times me-1"></i>Hủy
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
