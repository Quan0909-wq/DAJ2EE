<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Khuyến Mãi - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <th:block th:replace="~{fragments/navbar :: navbarStyles}"></th:block>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; padding-top: 110px; }
        .hero-banner {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 60px 0;
            border-bottom: 3px solid #E50914;
            text-align: center;
        }
        .hero-title { font-size: 2.5rem; font-weight: 800; color: #E50914; }
        .promo-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(229,9,20,0.3);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .promo-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: #E50914;
        }
        .promo-card:hover { transform: translateX(5px); box-shadow: 0 5px 20px rgba(229,9,20,0.3); }
        .promo-code {
            background: rgba(229,9,20,0.15);
            color: #E50914;
            padding: 5px 15px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1rem;
            display: inline-block;
            border: 1px dashed #E50914;
        }
        .promo-title { font-weight: 800; font-size: 1.3rem; color: #fff; }
        .promo-desc { color: #aaa; font-size: 0.9rem; }
        .promo-date { color: #ffc107; font-size: 0.8rem; font-weight: 600; }
        .promo-discount {
            font-size: 2rem;
            font-weight: 800;
            color: #E50914;
        }
        .promo-badge {
            position: absolute; top: 15px; right: 15px;
            background: #ffc107; color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div th:replace="~{fragments/navbar :: topbar}"></div>
<!-- Main navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- Sidebar -->
<div th:replace="~{fragments/navbar :: sidebar}"></div>
<!-- Dating notification panel -->
<div th:replace="~{fragments/navbar :: notifPanel}"></div>
<!-- Scripts -->
<div th:replace="~{fragments/navbar :: scripts}"></div>

<div class="hero-banner">
    <div class="container">
        <h1 class="hero-title"><i class="fas fa-tags me-3"></i>KHUYẾN MÃI</h1>
        <p class="text-secondary mt-2">Những ưu đãi hấp dẫn dành cho bạn tại PELE Cinema</p>
    </div>
</div>

<div class="container py-5">
    <div class="row g-4">
        <div class="col-md-6" th:each="promo : ${promotions}">
            <div class="promo-card">
                <div class="promo-badge" th:text="${promo.discountPercent >= 15 ? 'HOT' : 'ƯU ĐÃI'}">HOT</div>
                <div class="promo-discount mb-2" th:if="${promo.discountPercent > 0}"
                     th:text="|GIẢM ${promo.discountPercent}%|">GIẢM 20%</div>
                <div class="promo-discount mb-2" th:if="${promo.discountPercent == 0 and promo.discountAmount > 0}"
                     th:text="|GIẢM ${#numbers.formatDecimal(promo.discountAmount, 0, 'COMMA', 0, 'POINT')}đ|">GIẢM 50.000đ</div>
                <div class="promo-discount mb-2 text-secondary" th:if="${promo.discountPercent == 0 and promo.discountAmount == 0}">
                    Ưu đãi đặc biệt
                </div>
                <div class="promo-title mb-2" th:text="${promo.title}">Tên khuyến mãi</div>
                <div class="promo-desc mb-3" th:text="${promo.description}">Mô tả chi tiết...</div>
                <div class="promo-code mb-2" th:text="${promo.code}">PELE20</div>
                <div class="promo-date">
                    <i class="fas fa-clock me-1"></i>
                    Hết hạn:
                    <span th:if="${promo.expiresAt != null}" th:text="${#temporals.format(promo.expiresAt, 'dd/MM/yyyy')}">31/12/2026</span>
                    <span th:if="${promo.expiresAt == null}">Không giới hạn</span>
                </div>
                <a href="/" class="btn btn-danger btn-sm mt-3">
                    <i class="fas fa-ticket-alt me-2"></i>Áp dụng ngay
                </a>
            </div>
        </div>

        <div class="col-12 text-center text-secondary py-5" th:if="${#lists.isEmpty(promotions)}">
            <i class="fas fa-tags fa-4x mb-3" style="color: #333;"></i>
            <h4>Hiện không có khuyến mãi</h4>
            <p>Hãy quay lại sau để cập nhật các ưu đãi mới nhất</p>
            <a href="/" class="btn btn-danger mt-3"><i class="fas fa-home me-2"></i>Trang chủ</a>
        </div>
    </div>
</div>

</body>
</html>
