<!DOCTYPE html>
<html xmlns:th="http://www.thymoleaf.org">
<head>
    <title>Vé nhóm của tôi - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <th:block th:replace="~{fragments/navbar :: navbarStyles}"></th:block>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; padding-top: 110px; min-height: 100vh; }
        .container { max-width: 1100px; }
        .page-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 30px; }

        .booking-card {
            background: #121212;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
            transition: 0.3s;
        }
        .booking-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }
        .booking-code {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #667eea;
        }
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-success { background: rgba(40, 167, 69, 0.2); color: #28a745; }
        .status-pending { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .status-cancelled { background: rgba(220, 53, 69, 0.2); color: #dc3545; }

        .movie-title { font-weight: 800; font-size: 1.2rem; color: #667eea; }
        .info-row { display: flex; gap: 30px; flex-wrap: wrap; }
        .info-item { display: flex; align-items: center; gap: 8px; color: #888; font-size: 0.85rem; }
        .info-item i { color: #667eea; }

        .discount-badge {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .total-amount {
            font-size: 1.5rem;
            font-weight: 800;
            color: #28a745;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state i { font-size: 4rem; margin-bottom: 20px; color: #333; }

        .btn-detail {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-detail:hover { color: white; transform: scale(1.05); }
    </style>
</head>
<body>

<!-- Top bar -->
<div th:replace="~{fragments/navbar :: topbar}"></div>
<!-- Main navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- Sidebar -->
<div th:replace="~{fragments/navbar :: sidebar}"></div>
<!-- Dating notification panel -->
<div th:replace="~{fragments/navbar :: notifPanel}"></div>
<!-- Scripts -->
<div th:replace="~{fragments/navbar :: scripts}"></div>

<div class="container">
    <h2 class="page-title">
        <i class="fas fa-users me-3" style="color: #667eea;"></i>VÉ NHÓM CỦA TÔI
    </h2>

    <div th:if="${#lists.isEmpty(groupBookings)}" class="empty-state">
        <i class="fas fa-ticket-alt"></i>
        <h4>Chưa có vé nhóm nào</h4>
        <p>Bạn chưa đặt vé nhóm nào. Hãy đặt vé cùng bạn bè để được giảm giá nhé!</p>
        <a href="/" class="btn btn-danger mt-3">Đặt vé ngay</a>
    </div>

    <div th:each="booking : ${groupBookings}" class="booking-card">
        <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
                <span class="booking-code" th:text="${booking.roomCode}">GRP-XXXXXXXX</span>
                <h4 class="movie-title mt-2">Phòng vé nhóm</h4>
            </div>
            <span class="status-badge"
                  th:classappend="${booking.status == 2} ? 'status-success' : (${booking.status == 1} ? 'status-pending' : 'status-cancelled')"
                  th:text="${booking.status == 2} ? 'THÀNH CÔNG' : (${booking.status == 1} ? 'ĐANG CHỌN' : (${booking.status == 3} ? 'HẾT HẠN' : 'CHỜ'))">
                Trạng thái
            </span>
        </div>

        <div class="info-row mb-3">
            <div class="info-item">
                <i class="fas fa-film"></i>
                <span th:text="${booking.showtime != null ? booking.showtime.movie.title : 'Phim'}">Tên phim</span>
            </div>
            <div class="info-item">
                <i class="fas fa-chair"></i>
                <span th:text="${booking.allSeats != null ? booking.allSeats : 'Chưa chọn'}">Ghế</span>
            </div>
            <div class="info-item">
                <i class="fas fa-users"></i>
                <span th:text="${booking.members.size() + ' người'}">Số người</span>
            </div>
            <div class="info-item" th:if="${booking.showtime != null}">
                <i class="fas fa-clock"></i>
                <span th:text="${#temporals.format(booking.showtime.startTime, 'HH:mm - dd/MM/yyyy')}">Giờ chiếu</span>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center pt-3 border-top border-secondary">
            <div>
                <span class="text-secondary small me-2">Đã tiết kiệm:</span>
                <span class="discount-badge" th:if="${booking.discountPercent > 0}">
                    -<span th:text="${#numbers.formatDecimal(booking.originalAmount * booking.discountPercent, 0, 'COMMA', 0, 'POINT')}">0</span>đ (<span th:text="${#numbers.formatDecimal(booking.discountPercent * 100, 0, 'COMMA', 0, 'POINT')}">0</span>%)
                </span>
                <span class="text-secondary small" th:if="${booking.discountPercent == 0}">Không có</span>
            </div>
            <div class="text-end">
                <div class="total-amount" th:text="${#numbers.formatDecimal(booking.finalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</div>
                <a th:href="@{/group/{roomCode}(roomCode=${booking.roomCode})}" class="btn-detail mt-2">
                    <i class="fas fa-eye me-2"></i>Chi tiết
                </a>
            </div>
        </div>
    </div>

    <a href="/" class="btn btn-outline-light mt-4">
        <i class="fas fa-arrow-left me-2"></i>Quay lại trang chủ
    </a>
</div>

</body>
</html>
