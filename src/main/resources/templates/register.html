<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng Ký - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .auth-card { background: #121212; padding: 40px; border-radius: 20px; border-top: 5px solid #E50914; box-shadow: 0 15px 40px rgba(0,0,0,0.8); width: 100%; max-width: 450px; }

        /* Chỉnh lại ô input */
        .form-control { background: #222; border: 1px solid #333; color: #fff; padding: 12px; }
        .form-control:focus { background: #2a2a2a; border-color: #E50914; color: #fff; box-shadow: none; }

        /* CSS Khống chế màu nền khi trình duyệt tự điền (Autofill) */
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #222 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .btn-auth { background: #E50914; color: #fff; font-weight: 800; padding: 12px; border: none; border-radius: 8px; width: 100%; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-auth:hover { background: #b80710; transform: scale(1.02); }
        .text-pele { color: #E50914; font-weight: 800; }
        .form-label { font-size: 0.8rem; color: #a0a0a0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 class="text-center mb-4">GIA NHẬP <span class="text-pele">PELE</span></h2>

    <div th:if="${error}" class="alert alert-danger text-center p-2 mb-3" th:text="${error}"></div>

    <form action="/register" method="POST">
        <div class="mb-3">
            <label class="form-label fw-bold">Họ và tên thật</label>
            <input type="text" name="fullName" class="form-control" placeholder="VD: Trần Nhật Quan" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Tên đăng nhập (Username)</label>
            <input type="text" name="username" class="form-control" placeholder="VD: quan123" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Mật khẩu</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Địa chỉ Email</label>
            <input type="email" name="email" class="form-control" placeholder="VD: email@gmail.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Số điện thoại</label>
            <input type="text" name="phone" class="form-control" placeholder="VD: 0987654321" required>
        </div>

        <button type="submit" class="btn btn-auth">Tạo Tài Khoản</button>
    </form>

    <p class="text-center mt-4 text-secondary mb-0">Đã có tài khoản? <a href="/login" class="text-pele text-decoration-none">Đăng nhập ngay</a></p>
</div>

</body>
</html>
