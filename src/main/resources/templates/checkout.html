<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thanh Toán - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; padding-top: 50px; }
        .checkout-wrapper { max-width: 900px; margin: 0 auto; background: #121212; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .left-col { padding: 40px; }
        .right-col { background: #1a1a1a; padding: 40px; border-left: 2px solid #E50914; }
        .form-control { background: #252525; border: 1px solid #333; color: white; padding: 12px; }
        .form-control:focus { background: #222; border-color: #E50914; color: white; box-shadow: none; }
        .btn-pay { background: #E50914; color: white; font-weight: 800; padding: 15px; text-transform: uppercase; border-radius: 8px; transition: 0.3s; }
        .btn-pay:hover { background: #b20710; transform: translateY(-2px); color: white; }

        /* Box nhập mã */
        .discount-box { background: rgba(229, 9, 20, 0.05); border: 1px dashed #E50914; transition: 0.3s; }
        .discount-box:hover { box-shadow: 0 0 15px rgba(229, 9, 20, 0.2); }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="checkout-wrapper row g-0 mt-4">
        <div class="col-md-7 left-col">
            <h4 class="fw-bold text-warning mb-4"><i class="fa-solid fa-address-card me-2"></i>THÔNG TIN NGƯỜI NHẬN VÉ</h4>

            <form action="/booking/confirm" method="POST">
                <input type="hidden" name="showtimeId" th:value="${showtime.id}">
                <input type="hidden" name="seats" th:value="${seats}">
                <input type="hidden" id="totalAmountInput" name="finalAmount" th:value="${totalAmount}">

                <div class="mb-3">
                    <label class="form-label text-secondary fw-bold small">HỌ VÀ TÊN</label>
                    <input type="text" name="customerName" class="form-control" placeholder="Nhập tên của cậu..." required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary fw-bold small">SỐ ĐIỆN THOẠI</label>
                    <input type="tel" name="customerPhone" class="form-control" placeholder="VD: 0987654321" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary fw-bold small">EMAIL NHẬN VÉ</label>
                    <input type="email" name="customerEmail" class="form-control" placeholder="VD: nguyenvana@gmail.com" required>
                    <div class="form-text text-muted small mt-1"><i class="fa-solid fa-circle-info"></i> Vé điện tử sẽ được gửi về Email này.</div>
                </div>

                <div class="discount-box mt-4 mb-4 p-3 rounded">
                    <label class="form-label text-warning fw-bold"><i class="fa-solid fa-gift me-2"></i>MÃ KHUYẾN MÃI</label>

                    <!-- Danh sách mã đang có -->
                    <div class="mb-3" th:if="${not #lists.isEmpty(activePromotions)}">
                        <small class="text-secondary d-block mb-2">Mã khuyến mãi hiện có:</small>
                        <div class="d-flex flex-wrap gap-2">
                            <button type="button" class="btn btn-sm"
                                    th:each="p : ${activePromotions}"
                                    th:data-code="${p.code}"
                                    th:data-discount="${p.discountAmount > 0 ? #numbers.formatDecimal(p.discountAmount, 0, 0, 'POINT') + 'đ' : p.discountPercent + '%'}"
                                    onclick="fillPromoCode(this)"
                                    style="background: rgba(229,9,20,0.15); border: 1px dashed #E50914; color: #ff6b6b; font-size: 0.75rem; cursor: pointer;">
                                <span th:text="${p.code}">CODE</span>
                                <span class="ms-1" th:text="${p.discountAmount > 0} ? ${'(-' + #numbers.formatDecimal(p.discountAmount, 0, 0, 'POINT') + 'đ)'} : ${'(-' + p.discountPercent + '%)'}">(-0%)</span>
                            </button>
                        </div>
                    </div>

                    <div class="input-group">
                        <input type="text" id="promoCode" class="form-control border-secondary"
                               placeholder="Nhập mã khuyến mãi..."
                               autocomplete="off">
                        <button type="button" class="btn btn-danger fw-bold px-4" onclick="applyPromo()">ÁP DỤNG</button>
                    </div>
                    <small id="promoMessage" class="fw-bold mt-2 d-none"></small>
                </div>

                <!-- Thông tin giảm giá ẩn gửi về server -->
                <input type="hidden" id="appliedDiscount" name="appliedDiscount" value="0">

                <button type="submit" class="btn btn-pay w-100 mt-2"><i class="fa-solid fa-check-circle me-2"></i>XÁC NHẬN THANH TOÁN</button>
            </form>
        </div>

        <div class="col-md-5 right-col">
            <h5 class="fw-bold mb-4 border-bottom border-secondary pb-3">TÓM TẮT ĐƠN HÀNG</h5>

            <h5 class="text-danger fw-bold" th:text="${showtime.movie.title}">Tên Phim</h5>
            <p class="text-secondary small mb-4" th:text="${showtime.room.name} + ' | ' + ${#temporals.format(showtime.startTime, 'HH:mm - dd/MM/yyyy')}"></p>

            <div class="d-flex justify-content-between mb-3 border-bottom border-dark pb-2">
                <span class="text-secondary">Ghế đã chọn:</span>
                <strong class="text-warning" th:text="${seats}">A1, A2</strong>
            </div>

            <div id="discountRow" class="d-flex justify-content-between mb-3 d-none">
                <span class="text-success fw-bold"><i class="fa-solid fa-tag me-1"></i> Khuyến mãi:</span>
                <strong class="text-success">-50.000 đ</strong>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <span class="text-secondary fw-bold fs-5">TỔNG CỘNG:</span>
                <strong id="totalAmountDisplay" class="text-danger fs-4" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</strong>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // Lấy tổng tiền thực tế từ Java đẩy xuống HTML
    let originalTotal = /*[[${originalAmount}]]*/ 0;
    let isPromoApplied = false;

    /** Điền nhanh mã từ nút bấm trên giao diện */
    function fillPromoCode(btn) {
        const code = btn.getAttribute('data-code');
        document.getElementById('promoCode').value = code;
        applyPromo();
    }

    /** Gọi API /booking/apply-promo để kiểm tra & tính giảm giá từ DB */
    function applyPromo() {
        const codeInput = document.getElementById('promoCode');
        const code = codeInput.value.trim().toUpperCase();
        const msg = document.getElementById('promoMessage');
        const totalDisplay = document.getElementById('totalAmountDisplay');
        const totalInput = document.getElementById('totalAmountInput');
        const discountRow = document.getElementById('discountRow');
        const discountHidden = document.getElementById('appliedDiscount');
        const showtimeId = /*[[${showtime.id}]]*/ null;

        if (!code) {
            msg.innerText = "⚠️ Vui lòng nhập mã khuyến mãi!";
            msg.className = "text-warning fw-bold mt-2 d-block";
            return;
        }
        if (isPromoApplied) return;

        fetch('/booking/apply-promo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                code: code,
                originalAmount: originalTotal,
                showtimeId: showtimeId || ''
            })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                let newTotal = data.newTotal;
                let discountAmt = data.discount;

                totalDisplay.innerText = new Intl.NumberFormat('vi-VN').format(newTotal) + ' đ';
                totalInput.value = newTotal;
                discountHidden.value = discountAmt;

                // Hiện dòng giảm giá bên cột phải
                discountRow.querySelector('strong').innerText =
                    '-' + Intl.NumberFormat('vi-VN').format(discountAmt) + ' đ';
                discountRow.className = "d-flex justify-content-between mb-3";

                msg.innerText = "🎉 " + data.discountText + " — Áp dụng thành công!";
                msg.className = "text-success fw-bold mt-2 d-block";

                isPromoApplied = true;
                codeInput.readOnly = true;
            } else {
                msg.innerText = "❌ " + data.message;
                msg.className = "text-danger fw-bold mt-2 d-block";
            }
        })
        .catch(() => {
            msg.innerText = "❌ Đã xảy ra lỗi khi áp dụng mã!";
            msg.className = "text-danger fw-bold mt-2 d-block";
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
