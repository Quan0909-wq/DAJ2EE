<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chat Dating - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <th:block th:replace="~{fragments/navbar :: navbarStyles}"></th:block>
    <style>
        :root { --primary: #E50914; }
        body { background: #0b0c10; color: #fff; font-family: 'Montserrat', sans-serif; padding-top: 110px; }
        .chat-container { max-width: 700px; margin: 0 auto; height: calc(100vh - 160px); display: flex; flex-direction: column; }
        .chat-header { background: #121212; border-bottom: 1px solid #333; padding: 15px 20px; display: flex; align-items: center; gap: 15px; }
        .chat-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid #E50914; }
        .chat-avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; background: #E50914; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #0b0c10; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 0.9rem; position: relative; }
        .msg-mine { align-self: flex-end; background: #E50914; color: #fff; border-bottom-right-radius: 4px; }
        .msg-other { align-self: flex-start; background: #222; color: #fff; border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 0.65rem; opacity: 0.7; margin-top: 3px; text-align: right; }
        .msg-other .msg-meta { text-align: left; }
        .msg-name { font-size: 0.7rem; font-weight: 700; color: #aaa; margin-bottom: 3px; }
        .chat-input-area { background: #121212; border-top: 1px solid #333; padding: 15px; display: flex; gap: 10px; }
        .chat-input { background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 25px; padding: 10px 18px; flex: 1; }
        .chat-input:focus { background: #1a1a1a; border-color: #E50914; color: #fff; box-shadow: 0 0 0 0.2rem rgba(229,9,20,0.25); }
        .btn-send { background: #E50914; border: none; color: #fff; border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-send:hover { background: #ff4757; transform: scale(1.1); }
        .back-link { color: #aaa; text-decoration: none; font-size: 0.85rem; }
        .back-link:hover { color: #fff; }
        .msg-time { font-size: 0.6rem; color: #666; text-align: center; margin: 5px 0; }
        .typing-indicator { align-self: flex-start; display: none; }
        .typing-indicator span { width: 8px; height: 8px; background: #444; border-radius: 50%; display: inline-block; margin: 0 2px; animation: typing 1.4s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); }
    </style>
</head>
<body>

<!-- Top bar -->
<div th:replace="~{fragments/navbar :: topbar}"></div>
<!-- Main navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- Sidebar -->
<div th:replace="~{fragments/navbar :: sidebar}"></div>
<!-- Dating notification panel -->
<div th:replace="~{fragments/navbar :: notifPanel}"></div>
<!-- Scripts -->
<div th:replace="~{fragments/navbar :: scripts}"></div>

<div class="chat-container">
    <!-- Header -->
    <div class="chat-header">
        <a href="/pele-dating" class="back-link me-2"><i class="fa-solid fa-arrow-left"></i></a>

        <div th:if="${otherProfile != null and otherProfile.avatarUrl != null and !otherProfile.avatarUrl.isBlank()}"
             class="chat-avatar-placeholder" style="background: transparent; border: 2px solid #E50914; overflow: hidden;">
            <img th:src="${otherProfile.avatarUrl}" class="chat-avatar" style="border: none; width: 44px; height: 44px;">
        </div>
        <div th:unless="${otherProfile != null and otherProfile.avatarUrl != null and !otherProfile.avatarUrl.isBlank()}"
             class="chat-avatar-placeholder">
            <span th:text="${otherProfile != null ? #strings.substring(otherProfile.displayName, 0, 1) : '?'}">?</span>
        </div>

        <div>
            <div class="fw-bold" th:text="${otherProfile != null ? otherProfile.displayName : 'Người dùng'}">Người dùng</div>
            <small class="text-secondary" th:if="${otherProfile != null}">
                <i class="fa-solid fa-heart text-danger me-1"></i>
                <span th:if="${otherProfile.age != null}" th:text="${otherProfile.age}">25</span> tuổi ·
                <span th:if="${otherProfile.hometown != null}" th:text="${otherProfile.hometown}">TP.HCM</span>
            </small>
        </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
        <div class="text-center text-secondary py-3" th:if="${#lists.isEmpty(messages)}">
            <i class="fa-solid fa-heart-pulse fa-2x mb-2"></i>
            <p class="mb-0">Hai bạn đã match! Hãy bắt đầu cuộc trò chuyện.</p>
        </div>

        <div th:each="msg : ${messages}" th:with="isMine=${msg.sender.id == currentUser.id}"
             class="msg-bubble" th:classappend="${isMine} ? ' msg-mine' : ' msg-other'">
            <div th:if="${!isMine}" class="msg-name" th:text="${currentUser != null ? 'Người đó' : ''}">Người đó</div>
            <div th:text="${msg.content}">Nội dung tin nhắn</div>
            <div class="msg-meta">
                <span th:text="${#temporals.format(msg.createdAt, 'HH:mm')}">00:00</span>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Nhắn tin..."
               autocomplete="off" maxlength="1000">
        <button class="btn-send" id="sendBtn" type="button" onclick="sendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    var matchId = /*[[${match != null ? match.id : 0}]]*/ 0;
    var currentUserId = /*[[${currentUser != null ? currentUser.id : 0}]]*/ 0;

    // Auto scroll to bottom
    function scrollToBottom() {
        var el = document.getElementById('chatMessages');
        el.scrollTop = el.scrollHeight;
    }
    scrollToBottom();

    // Enter key to send
    document.getElementById('messageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
        var input = document.getElementById('messageInput');
        var content = input.value.trim();
        if (!content || matchId === 0) return;

        fetch('/pele-dating/chat/' + matchId + '/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'content=' + encodeURIComponent(content)
        }).then(r => r.json()).then(data => {
            if (data.success) {
                input.value = '';
                addMessageToUI(content, new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'}), true);
                scrollToBottom();
            } else {
                alert(data.error || 'Gửi thất bại!');
            }
        }).catch(() => { input.value = content; });
    }

    function addMessageToUI(content, time, isMine) {
        var container = document.getElementById('chatMessages');
        var div = document.createElement('div');
        div.className = 'msg-bubble ' + (isMine ? 'msg-mine' : 'msg-other');
        div.innerHTML = '<div>' + escapeHtml(content) + '</div><div class="msg-meta">' + time + '</div>';
        container.insertBefore(div, document.getElementById('typingIndicator'));
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Poll for new messages every 3 seconds
    setInterval(function() {
        if (matchId === 0) return;
        fetch('/pele-dating/matches/' + matchId + '/messages')
            .then(r => r.json())
            .then(data => {
                // For simplicity, reload page every 5 polls to show new messages
            }).catch(() => {});
    }, 5000);
</script>

</body>
</html>
