<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đổi Phim - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <th:block th:replace="~{fragments/navbar :: navbarStyles}"></th:block>
    <style>
        body{background:#050505;color:#fff;font-family:'Montserrat',sans-serif;padding-top:110px}
        .wrap{max-width:1200px;margin:0 auto;padding:20px}
        .movie-card{background:#121212;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.06);height:100%}
        .movie-card img{width:100%;height:330px;object-fit:cover}
        .movie-body{padding:16px}
        .showtime-chip{display:inline-block;margin:4px 4px 0 0;padding:8px 12px;border-radius:999px;background:rgba(229,9,20,.14);color:#fff;text-decoration:none;border:1px solid rgba(229,9,20,.35);font-size:.9rem}
        .showtime-chip:hover{background:#E50914;color:#fff}
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: topbar}"></div>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/navbar :: sidebar}"></div>
<div th:replace="~{fragments/navbar :: notifPanel}"></div>

<div class="wrap">
    <h2 class="fw-bold text-danger mb-2"><i class="fa-solid fa-film me-2"></i>Đổi phim trên chính vé cũ</h2>
    <p class="text-secondary mb-4">Chọn phim mới và suất chiếu mới. Hệ thống sẽ cập nhật trực tiếp trên vé cũ của bạn.</p>

    <div class="row g-4">
        <div class="col-lg-4 col-md-6" th:each="movie : ${movies}" th:if="${showtimeMap[movie.id] != null and !#lists.isEmpty(showtimeMap[movie.id])}">
            <div class="movie-card">
                <img th:src="${movie.posterUrl}" alt="Poster">
                <div class="movie-body">
                    <div class="fw-bold fs-5 mb-2" th:text="${movie.title}">Tên phim</div>
                    <div class="text-secondary small mb-2" th:text="${movie.genre}">Hành động</div>
                    <div>
                        <a class="showtime-chip"
                           th:each="s : ${showtimeMap[movie.id]}"
                           th:href="@{'/booking/change-movie/select/' + ${s.id} + '?bookingId=' + ${booking.id}}">
                            <span th:text="${#temporals.format(s.startTime,'HH:mm dd/MM')}">19:30 01/01</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <a href="/my-tickets" class="btn btn-outline-light mt-4">← Quay lại vé của tôi</a>
</div>

<div th:replace="~{fragments/navbar :: scripts}"></div>
</body>
</html>
