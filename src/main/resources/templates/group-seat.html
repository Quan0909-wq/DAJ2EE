<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chọn ghế - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #E50914;
            --bg-body: #050505;
            --bg-card: #121212;
            --accent-purple: #667eea;
        }
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-body);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
        }

        .main-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }

        .room-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 8px;
        }

        .movie-info h2 { font-size: 1.5rem; font-weight: 800; margin: 0; }
        .movie-info p { font-size: 0.8rem; color: #888; margin-bottom: 15px; }

        .screen-container { width: 70%; margin: 0 auto 30px auto; text-align: center; }
        .screen-curve {
            height: 8px; width: 100%;
            border-top: 3px solid var(--accent-purple);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            box-shadow: 0 -5px 15px rgba(102,126,234,0.4);
        }
        .screen-text { color: var(--accent-purple); font-size: 0.6rem; letter-spacing: 5px; font-weight: 700; margin-top: 5px; }

        .seat-container { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .seat-row { display: flex; gap: 6px; align-items: center; }
        .row-label { width: 20px; font-weight: 800; color: var(--accent-purple); text-align: center; font-size: 0.7rem; }

        .seat {
            width: 28px; height: 28px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 5px 5px 8px 8px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 600; color: #555;
            transition: 0.2s;
        }
        .seat:hover:not(.occupied):not(.group-taken) { border-color: var(--accent-purple); color: #fff; transform: scale(1.1); }
        .seat.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            color: #fff !important;
            box-shadow: 0 0 10px rgba(102,126,234,0.6);
        }
        .seat.occupied { background: #1a1a1a !important; color: #333 !important; cursor: not-allowed; }
        .seat.group-taken {
            background: rgba(255,193,7,0.2) !important;
            border-color: rgba(255,193,7,0.4) !important;
            color: #ffc107 !important;
            cursor: not-allowed;
        }

        .legend-box {
            margin-top: 25px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(102,126,234,0.2);
            border-radius: 12px;
            display: inline-block;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 700; color: #999; }
        .legend .seat { width: 18px; height: 18px; font-size: 0; }

        .booking-card {
            background: var(--bg-card); padding: 20px; border-radius: 15px;
            border-left: 4px solid var(--accent-purple);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-height: 90vh; overflow-y: auto;
        }
        .booking-card::-webkit-scrollbar { width: 4px; }
        .booking-card::-webkit-scrollbar-thumb { background: var(--accent-purple); border-radius: 10px; }

        .text-price { color: var(--accent-purple); font-weight: 800; font-size: 1.5rem; }

        .timer-box {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.3);
            border-radius: 8px;
            padding: 5px 15px;
            display: inline-block;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container-fluid">
        <div class="row justify-content-center g-4">

            <div class="col-lg-7 text-center">
                <div class="movie-info text-start mb-3 ps-5">
                    <span class="room-badge">
                        <i class="fas fa-users me-1"></i>
                        PHÒNG: <span th:text="${group.roomCode}">ABC123</span>
                    </span>
                    <div class="d-flex align-items-center gap-3 flex-wrap">
                        <h2 th:text="${showtime.movie.title}" class="mb-0">Phim</h2>
                        <div class="timer-box">
                            <i class="fas fa-clock me-1"></i>
                            <span id="timer-text">--:--</span>
                        </div>
                    </div>
                    <p th:text="${showtime.room.name} + ' | ' + ${#temporals.format(showtime.startTime, 'HH:mm - dd/MM/yyyy')}">Phòng | 19:00</p>
                </div>

                <div class="screen-container">
                    <div class="screen-curve"></div>
                    <div class="screen-text">MÀN HÌNH</div>
                </div>

                <div class="seat-container">
                    <div class="seat-row" th:each="r : ${#numbers.sequence(1, rows)}">
                        <div class="row-label" th:text="${#strings.substring('ABCDEFGHIJKLMNOPQRSTUVWXYZ', r-1, r)}"></div>
                        <div class="seat" th:each="c : ${#numbers.sequence(1, cols)}"
                             th:data-seat="${#strings.substring('ABCDEFGHIJKLMNOPQRSTUVWXYZ', r-1, r)} + ${c}"
                             onclick="toggleSeat(this)">
                            <span th:text="${c}"></span>
                        </div>
                        <div class="row-label" th:text="${#strings.substring('ABCDEFGHIJKLMNOPQRSTUVWXYZ', r-1, r)}"></div>
                    </div>
                </div>

                <div class="legend-box">
                    <div class="d-flex gap-4">
                        <div class="legend-item"><div class="seat"></div> TRỐNG</div>
                        <div class="legend-item"><div class="seat selected"></div> ĐANG CHỌN</div>
                        <div class="legend-item"><div class="seat occupied"><i class="fa-solid fa-xmark"></i></div> ĐÃ BÁN</div>
                        <div class="legend-item"><div class="seat group-taken"><i class="fa-solid fa-user"></i></div> NHÓM KHÁC</div>
                    </div>
                </div>
            </div>

            <div class="col-lg-3">
                <div class="booking-card">
                    <input type="hidden" id="member-id" th:value="${currentMember?.id}">
                    <input type="hidden" id="room-code" th:value="${group.roomCode}">

                    <h5 class="fw-bold mb-3 border-bottom border-secondary pb-2">
                        <i class="fas fa-chair me-2" style="color: var(--accent-purple);"></i>CHỌN GHẾ
                    </h5>

                    <div class="mb-2">
                        <span class="text-secondary small">Thành viên:</span>
                        <span class="fw-bold ms-1" th:text="${currentMember?.name}">Người dùng</span>
                        <span th:if="${currentMember?.isCreator}" class="badge bg-danger ms-1" style="font-size: 0.6rem;">ADMIN</span>
                    </div>

                    <div class="mb-3">
                        <p class="text-secondary small fw-bold mb-1">GHẾ CỦA BẠN</p>
                        <h6 id="selected-seats-list" class="fw-bold text-white m-0">Chưa chọn ghế</h6>
                    </div>

                    <div class="mb-3 p-2" style="background: rgba(255,193,7,0.08); border-radius: 8px;">
                        <p class="text-warning small fw-bold mb-1">
                            <i class="fas fa-info-circle me-1"></i>Ghế nhóm khác
                        </p>
                        <div class="small text-warning" id="group-seats-list"
                             th:text="${groupSeats != null && !groupSeats.isEmpty()} ? ${groupSeats} : 'Không có'">Không có</div>
                    </div>

                    <div class="mb-4 border-top border-secondary pt-2">
                        <p class="text-secondary small fw-bold mb-1">SỐ GHẾ CHỌN</p>
                        <div class="text-price"><span id="seat-count">0</span> <small class="fs-6">ghế</small></div>
                    </div>

                    <button type="button" class="btn w-100 mb-2" id="btn-save" disabled
                            style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-weight: 700; padding: 12px;"
                            onclick="saveSeats()">
                        <i class="fas fa-save me-2"></i>LƯU GHẾ
                    </button>

                    <a th:href="@{'/group/' + ${group.roomCode}}"
                       class="btn btn-outline-secondary w-100 mb-2"
                       style="padding: 12px;">
                        <i class="fas fa-arrow-left me-2"></i>QUAY LẠI
                    </a>

                    <div id="save-result" class="small text-center mt-2" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    let selectedSeats = [];
    const memberId = [[${currentMember?.id}]];
    const roomCode = [[${group.roomCode}]];
    let remainingSeconds = [[${statusData?.remainingSeconds ?: 0}]];

    const occupiedSeatsStr = [[${occupiedSeats}]] || "";
    const occupiedSeats = occupiedSeatsStr.split(',').filter(s => s !== "");

    const groupSeatsStr = [[${groupSeats}]] || "";
    const groupSeats = groupSeatsStr.split(',').filter(s => s !== "");

    // Danh sach ghe da chon (tru ghe cua minh)
    const mySeatsStr = [[${currentMember?.seats}]] || "";
    const mySeats = mySeatsStr.split(',').filter(s => s !== "");
    selectedSeats = [...mySeats];

    // Danh dau ghe
    document.querySelectorAll('.seat').forEach(seat => {
        const seatId = seat.getAttribute('data-seat');
        if (occupiedSeats.includes(seatId)) {
            seat.classList.add('occupied');
            seat.innerHTML = '<i class="fa-solid fa-xmark" style="font-size: 8px;"></i>';
        } else if (groupSeats.includes(seatId)) {
            seat.classList.add('group-taken');
            seat.innerHTML = '<i class="fa-solid fa-user" style="font-size: 8px;"></i>';
        } else if (mySeats.includes(seatId)) {
            seat.classList.add('selected');
        }
    });

    // Timer
    function updateTimer() {
        if (remainingSeconds <= 0) {
            document.getElementById('timer-text').innerText = 'Hết hạn!';
            return;
        }
        const mins = Math.floor(remainingSeconds / 60);
        const secs = remainingSeconds % 60;
        document.getElementById('timer-text').innerText =
            String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        remainingSeconds--;
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // Toggle seat
    function toggleSeat(element) {
        if (element.classList.contains('occupied') || element.classList.contains('group-taken')) return;
        const seatId = element.getAttribute('data-seat');
        if (element.classList.contains('selected')) {
            element.classList.remove('selected');
            selectedSeats = selectedSeats.filter(s => s !== seatId);
        } else {
            element.classList.add('selected');
            selectedSeats.push(seatId);
        }
        updateUI();
    }

    function updateUI() {
        const count = selectedSeats.length;
        document.getElementById('selected-seats-list').innerText =
            count > 0 ? selectedSeats.join(', ') : 'Chưa chọn ghế';
        document.getElementById('seat-count').innerText = count;
        document.getElementById('btn-save').disabled = count === 0;
    }

    updateUI();

    // Save seats
    function saveSeats() {
        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Đang lưu...';

        fetch('/group/' + roomCode + '/seats?memberId=' + memberId + '&seats=' + encodeURIComponent(selectedSeats.join(',')), {
            method: 'POST'
        })
        .then(r => r.json())
        .then(data => {
            const result = document.getElementById('save-result');
            if (data.success) {
                result.style.display = 'block';
                result.innerHTML = '<span style="color: #28a745;"><i class="fas fa-check-circle me-1"></i>Đã lưu ghế thành công!</span>';
                setTimeout(() => { location.href = '/group/' + roomCode; }, 1500);
            } else {
                result.style.display = 'block';
                result.innerHTML = '<span style="color: #ff6b6b;"><i class="fas fa-times-circle me-1"></i>' + data.message + '</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save me-2"></i>LƯU GHẾ';
            }
        })
        .catch(() => {
            document.getElementById('save-result').innerHTML = '<span style="color: #ff6b6b;">Có lỗi xảy ra!</span>';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i>LƯU GHẾ';
        });
    }
</script>

</body>
</html>
