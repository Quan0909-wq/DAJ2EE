<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng Nhập - PELE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { background: #121212; padding: 40px; border-radius: 20px; border-top: 5px solid #E50914; box-shadow: 0 15px 40px rgba(0,0,0,0.8); width: 100%; max-width: 400px; }

        .form-control { background: #222; border: 1px solid #333; color: #fff; padding: 12px; }
        .form-control:focus { background: #2a2a2a; border-color: #E50914; color: #fff; box-shadow: none; }

        /* CSS Khống chế Autofill */
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #222 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .btn-auth { background: #E50914; color: #fff; font-weight: 800; padding: 12px; border: none; border-radius: 8px; width: 100%; text-transform: uppercase; transition: 0.3s; margin-top: 15px; }
        .btn-auth:hover { background: #b80710; transform: scale(1.02); }
        .text-pele { color: #E50914; font-weight: 800; }
        .form-label { font-size: 0.8rem; color: #a0a0a0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 class="text-center mb-4 text-uppercase">Đăng nhập</h2>

    <div th:if="${error}" class="alert alert-danger text-center p-2 mb-3" th:text="${error}"></div>
    <div th:if="${param.success}" class="alert alert-success text-center p-2 mb-3 text-dark fw-bold">
        Đăng ký thành công! Đăng nhập ngay.
    </div>

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label fw-bold">Tên đăng nhập</label>
            <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập..." required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Mật khẩu</label>
            <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu..." required>
        </div>

        <button type="submit" class="btn btn-auth">Vào Rạp</button>
    </form>

    <p class="text-center mt-4 text-secondary mb-0">Chưa có tài khoản? <a href="/register" class="text-pele text-decoration-none">Đăng ký tại đây</a></p>
</div>

</body>
</html>
