<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PELE Cinema - Đăng Nhập / Đăng Ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.9)),
                        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=2070') center/cover;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: white; overflow: hidden;
        }

        .auth-container {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(229, 9, 20, 0.5);
            border-radius: 20px;
            padding: 40px;
            width: 100%; max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px rgba(229, 9, 20, 0.3);
            position: relative;
        }

        .pele-logo {
            font-family: 'Cinzel', serif; font-size: 2.2rem; text-align: center;
            color: #fff; margin-bottom: 30px; letter-spacing: 2px;
        }
        .pele-logo span { color: #E50914; text-shadow: 0 0 15px rgba(229, 9, 20, 0.8); }

        /* Chuyển đổi giữa 2 tab */
        .nav-pills .nav-link { color: #ccc; font-weight: 600; border-radius: 30px; transition: 0.3s; }
        .nav-pills .nav-link.active { background-color: #E50914; color: white; box-shadow: 0 0 15px rgba(229, 9, 20, 0.5); }

        .form-control { background: rgba(255,255,255,0.05); border: 1px solid #444; color: white; border-radius: 10px; padding: 12px; }
        .form-control:focus { background: rgba(255,255,255,0.1); border-color: #E50914; box-shadow: 0 0 10px rgba(229, 9, 20, 0.3); color: white; }
        .form-control::placeholder { color: #777; }

        .btn-submit { background-color: #E50914; color: white; border: none; border-radius: 10px; padding: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; width: 100%; }
        .btn-submit:hover { background-color: #b80710; box-shadow: 0 0 20px rgba(229, 9, 20, 0.6); transform: translateY(-2px); }

        /* Animation khi chuyển form */
        .tab-pane { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="pele-logo"><i class="fa-solid fa-ghost"></i> PELE <span>CINEMA</span></div>

    <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button">ĐĂNG NHẬP</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button">ĐĂNG KÝ MỚI</button>
        </li>
    </ul>

    <div th:if="${error}" class="alert alert-danger text-center small fw-bold py-2 border-0 bg-danger text-white"><i class="fa-solid fa-triangle-exclamation"></i> <span th:text="${error}"></span></div>
    <div th:if="${success}" class="alert alert-success text-center small fw-bold py-2 border-0 bg-success text-white"><i class="fa-solid fa-check-circle"></i> <span th:text="${success}"></span></div>

    <div class="tab-content" id="pills-tabContent">

        <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label small text-secondary fw-bold">Tên đăng nhập</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-danger"><i class="fa-solid fa-user"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Nhập username" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-secondary fw-bold d-flex justify-content-between">
                        Mật khẩu <a href="#" class="text-danger text-decoration-none">Quên mật khẩu?</a>
                    </label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-danger"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">VÀO RẠP NGAY <i class="fa-solid fa-arrow-right ms-2"></i></button>
            </form>
        </div>

        <div class="tab-pane fade" id="pills-register" role="tabpanel">
            <form action="/register" method="POST">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Tên đăng nhập (Nick name)" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Mật khẩu bí mật" required>
                </div>
                <div class="mb-3">
                    <input type="text" name="fullName" class="form-control" placeholder="Họ và tên thật của bạn" required>
                </div>
                <div class="mb-3 d-flex gap-2">
                    <input type="email" name="email" class="form-control" placeholder="Email (VD: a@gmail.com)" required>
                    <input type="text" name="phone" class="form-control" placeholder="SĐT" required>
                </div>
                <button type="submit" class="btn-submit">TẠO TÀI KHOẢN MỚI</button>
            </form>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
